<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site In Progress</title>
    <style>
        /* 1. The Arcade Background */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0d0d; /* Deep charcoal arcade black */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 2. The Loading Container */
        .loading-container {
            text-align: center;
            position: relative;
            z-index: 5;
        }

        /* 3. The Big Text */
        .pixel-text {
            color: #ff0055; /* Arcade Pink/Red for urgency */
            font-size: clamp(2rem, 8vw, 5rem); /* Responsive size */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 4px 4px 0px #550022;
            animation: glitch 1s steps(2) infinite;
        }

        /* 4. The Infinite Loading Bar */
        .loading-bar-border {
            border: 4px solid #ff0055;
            width: 280px;
            height: 20px;
            margin: 0 auto;
            padding: 4px;
            position: relative;
            overflow: hidden;
        }

        .loading-bar-fill {
            background-color: #ff0055;
            height: 100%;
            width: 40%;
            position: absolute;
            left: -50%;
            /* Never-ending looping animation */
            animation: infiniteScroll 2s linear infinite;
        }

        /* 5. Animations */
        @keyframes glitch {
            0% { transform: translate(0); opacity: 1; }
            50% { transform: translate(3px, -2px); opacity: 0.8; }
            100% { transform: translate(-3px, 2px); opacity: 1; }
        }

        @keyframes infiniteScroll {
            0% { left: -50%; }
            100% { left: 110%; }
        }

        /* CRT Scanline Overlay */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>

    <div class="loading-container">
        <div class="pixel-text">Site In Progress</div>
        <div class="loading-bar-border">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

</body>
</html>
