<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Loading</title>
    <style>
        /* 1. The Arcade Background */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Classic black arcade screen */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Use a monospaced font for pixel feel */
        }

        /* 2. The Loading Container */
        .loading-container {
            text-align: center;
            position: relative;
        }

        /* 3. The Big Text */
        .pixel-text {
            color: #33ff33; /* Classic Matrix/CRT Green */
            font-size: 5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 20px;
            /* Applying the pixelated edge look */
            text-shadow: 4px 4px 0px #005500; 
            animation: blink 0.8s steps(2, start) infinite;
        }

        /* 4. The Loading Bar (Optional Extra) */
        .loading-bar-border {
            border: 4px solid #33ff33;
            width: 300px;
            height: 30px;
            margin: 0 auto;
            padding: 4px;
        }

        .loading-bar-fill {
            background-color: #33ff33;
            height: 100%;
            width: 0%;
            animation: fillBar 3s ease-in-out forwards;
        }

        /* 5. Animations */
        @keyframes blink {
            to { visibility: hidden; }
        }

        @keyframes fillBar {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* CRT Scanline Overlay Effect */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>

    <div class="loading-container">
        <div class="pixel-text">Loading...</div>
        <div class="loading-bar-border">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

</body>
</html>
